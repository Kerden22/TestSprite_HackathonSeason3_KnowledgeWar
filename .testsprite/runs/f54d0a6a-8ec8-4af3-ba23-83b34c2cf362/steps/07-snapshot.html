<body class="cosmic-bg min-h-screen overflow-y-auto" data-i18n-page-title="meta.learnTitle">
    <!-- Header -->
    <header class="cosmic-header">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-600 bg-clip-text text-transparent">
                        🚀 BTK Akademi
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="langToggle" class="nav-lang-toggle text-sm">
                        <button type="button" id="langEn" class="text-cyan-400 font-bold">EN</button>
                        <span class="text-gray-600">|</span>
                        <button type="button" id="langTr" class="text-gray-400 hover:text-white font-medium">TR</button>
                    </div>
                    <a href="/roadmap" class="text-gray-300 hover:text-white transition-colors" data-i18n="learn.backToRoadmap">← Back to Roadmap</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-12 min-h-screen">
        <div class="max-w-4xl mx-auto pb-12">
            <!-- Page Title -->
            <div class="text-center mb-12">
                <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-600 bg-clip-text text-transparent mb-4" data-i18n="learn.pageTitle">Personal Learning Roadmap</h1>
                <p class="text-gray-400 text-lg" data-i18n="learn.pageSubtitle">Get a personalized course recommendation with 4 questions</p>
            </div>

            <!-- Form Container -->
            <div id="formContainer" class="glass-card p-8 rounded-3xl">
                <form id="learningForm" class="space-y-8">
                    <!-- Skill Question -->
                    <div class="space-y-4">
                        <label class="block text-xl font-semibold text-white" data-i18n="learn.q1Label">1. What skill do you want to learn?</label>
                        <input type="text" name="skill" required="" class="w-full p-4 bg-gray-800 border border-gray-600 rounded-xl text-white input-glow focus:outline-none focus:border-cyan-400" data-i18n-placeholder="learn.q1Placeholder" placeholder="e.g. Python, JavaScript, React, Data Analysis..." value="">
                    </div>

                    <!-- Goal Question -->
                    <div class="space-y-4">
                        <label class="block text-xl font-semibold text-white" data-i18n="learn.q2Label">2. What is your learning goal?</label>
                        <input type="text" name="goal" required="" class="w-full p-4 bg-gray-800 border border-gray-600 rounded-xl text-white input-glow focus:outline-none focus:border-cyan-400" data-i18n-placeholder="learn.q2Placeholder" placeholder="e.g. find a job, build projects, career change..." value="">
                    </div>

                    <!-- Level Question -->
                    <div class="space-y-4">
                        <label class="block text-xl font-semibold text-white" data-i18n="learn.q3Label">3. What is your current level?</label>
                        <select name="level" required="" class="w-full p-4 bg-gray-800 border border-gray-600 rounded-xl text-white input-glow focus:outline-none focus:border-cyan-400">
                            <option value="" data-i18n="learn.levelSelect" selected="selected">Select level</option>
                            <option value="none" data-i18n="learn.levelNone">Complete beginner</option>
                            <option value="basic" data-i18n="learn.levelBasic">Basic knowledge</option>
                            <option value="intermediate" data-i18n="learn.levelIntermediate">Intermediate</option>
                            <option value="advanced" data-i18n="learn.levelAdvanced">Advanced</option>
                        </select>
                    </div>

                    <!-- Time Question -->
                    <div class="space-y-4">
                        <label class="block text-xl font-semibold text-white" data-i18n="learn.q4Label">4. How much time can you dedicate?</label>
                        <input type="text" name="time" required="" class="w-full p-4 bg-gray-800 border border-gray-600 rounded-xl text-white input-glow focus:outline-none focus:border-cyan-400" data-i18n-placeholder="learn.q4Placeholder" placeholder="e.g. 1 hour per day, 3 days a week, 2 months..." value="">
                    </div>

                    <!-- Submit Button -->
                    <div class="text-center pt-6">
                        <button type="submit" class="cosmic-btn text-xl px-12 py-4 pulse-btn" data-i18n="learn.submitBtn">🤖 Analyze My Profile</button>
                    </div>
                </form>
            </div>

            <!-- Loading Container -->
            <div id="loadingContainer" class="glass-card p-8 rounded-3xl hidden">
                <div class="text-center space-y-6">
                    <div class="text-3xl">🚀</div>
                    <h3 class="text-2xl font-bold text-white" data-i18n="learn.loadingTitle">Analyzing Your Profile...</h3>
                    <p class="text-gray-400" data-i18n="learn.loadingSubtitle">Searching for the best BTK Academy courses</p>
                    
                    <!-- Progress Bar -->
                    <div class="w-full bg-gray-700 rounded-full h-3">
                        <div class="cosmic-progress-fill h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    
                    <p class="text-sm text-gray-500" data-i18n="learn.loadingHint">This may take a few seconds</p>
                </div>
            </div>

            <!-- Results Container -->
            <div id="resultsContainer" class="glass-card p-8 rounded-3xl hidden">
                <div class="space-y-8">
                    <!-- Profile Summary -->
                    <div>
                        <h3 class="text-2xl font-bold text-white mb-4" data-i18n="learn.profileSummary">📊 Profile Summary</h3>
                        <div id="profileSummary" class="bg-gray-800 p-6 rounded-xl text-gray-300">
                            <!-- Profile data will be inserted here -->
                        </div>
                    </div>

                    <!-- Course Recommendation -->
                    <div>
                        <h3 class="text-2xl font-bold text-white mb-4" data-i18n="learn.recommendedCourse">🎯 Recommended Course</h3>
                        <div id="courseRecommendation" class="bg-gray-800 p-6 rounded-xl">
                            <!-- Course data will be inserted here -->
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex flex-col sm:flex-row gap-4 pt-6">
                        <button id="addToRoadmapBtn" class="cosmic-btn text-lg px-8 py-3 flex-1" data-i18n="learn.addToRoadmap">🗺️ Add to Roadmap</button>
                        <button onclick="resetForm()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-8 rounded-xl transition-colors flex-1" data-i18n="learn.newAnalysis">🔄 New Analysis</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/static/i18n.js"></script>
    <script>
        function swalError(text) {
            Swal.fire({
                icon: 'error',
                title: t('common.warning'),
                text: text,
                confirmButtonText: t('common.ok')
            });
        }

        function swalWarning(text) {
            Swal.fire({
                icon: 'warning',
                title: t('common.warning'),
                text: text,
                confirmButtonText: t('common.ok')
            });
        }
        // Form submission
        document.getElementById('learningForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await analyzeProfile();
        });

        // Add to roadmap button
        document.getElementById('addToRoadmapBtn').addEventListener('click', async () => {
            await addCourseToRoadmap();
        });

        async function analyzeProfile() {
            const form = document.getElementById('learningForm');
            const formData = new FormData(form);
            
            const data = {
                skill: formData.get('skill'),
                goal: formData.get('goal'),
                level: formData.get('level'),
                time: formData.get('time')
            };
            
            console.log('Sending data:', data);
            
            // Show loading
            document.getElementById('formContainer').classList.add('hidden');
            document.getElementById('loadingContainer').classList.remove('hidden');
            
            // Simulate loading animation
            const progressBar = document.querySelector('#loadingContainer .cosmic-progress-fill');
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                progressBar.style.width = progress + '%';
                if (progress >= 90) {
                    clearInterval(interval);
                }
            }, 100);
            
            try {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    throw new Error(t('learn.loginRequired'));
                }
                
                console.log('Making API request...');
                const response = await fetch('/api/analyze-profile', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Response data:', result);
                
                if (result.success) {
                    showResults(result);
                } else {
                    throw new Error(result.error || t('learn.errorGeneric'));
                }
                
            } catch (error) {
                console.error('Error:', error);
                
                // Hide loading and show form again
                document.getElementById('loadingContainer').classList.add('hidden');
                document.getElementById('formContainer').classList.remove('hidden');
                
                // Show error message
                const errorMessage = error.message || t('learn.unknownError');
                swalError(errorMessage);
                return;
            }
        }

        function showResults(result) {
            console.log('Showing results:', result);
            
            // Complete the progress bar
            const progressBar = document.querySelector('#loadingContainer .cosmic-progress-fill');
            progressBar.style.width = '100%';
            
            // Hide loading and show results
            setTimeout(() => {
                document.getElementById('loadingContainer').classList.add('hidden');
                document.getElementById('resultsContainer').classList.remove('hidden');
                
                // Show profile summary
                const profileSummary = document.getElementById('profileSummary');
                profileSummary.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <strong>${t('learn.fieldGoal')}</strong> ${result.profile.hedef}
                        </div>
                        <div>
                            <strong>${t('learn.fieldLevel')}</strong> ${result.profile.seviye}
                        </div>
                        <div>
                            <strong>${t('learn.fieldApproach')}</strong> ${result.profile.yaklasim}
                        </div>
                        <div>
                            <strong>${t('learn.fieldDuration')}</strong> ${result.profile.sure}
                        </div>
                    </div>
                `;
                
                // Show course recommendation
                const courseRecommendation = document.getElementById('courseRecommendation');
                if (result.recommended_course) {
                    courseRecommendation.innerHTML = `
                        <div class="space-y-4">
                            <h5 class="text-lg font-bold text-cosmic-blue">${result.recommended_course.title}</h5>
                            <p class="text-gray-400">${result.recommended_course.description}</p>
                            <p class="text-sm text-cosmic-green"><strong>${t('learn.whyThisCourse')}</strong> ${result.recommended_course.reason}</p>
                            <a href="${result.recommended_course.link}" target="_blank" class="inline-block bg-cosmic-blue text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                                ${t('learn.viewCourse')}
                            </a>
                        </div>
                    `;
                    
                    // Store course data for later use
                    window.currentCourse = result.recommended_course;
                } else {
                    courseRecommendation.innerHTML = `
                        <p class="text-gray-400">${t('learn.noCourseFound')}</p>
                    `;
                }
            }, 500);
        }

        async function addCourseToRoadmap() {
            if (!window.currentCourse) {
                swalError(t('learn.analyzeFirst'));
                return;
            }

            const addButton = document.getElementById('addToRoadmapBtn');
            const originalText = addButton.innerHTML;
            addButton.innerHTML = t('learn.preparing');
            addButton.disabled = true;
            addButton.classList.add('opacity-50');

            try {
                const token = localStorage.getItem('authToken');
                if (!token) {
                    throw new Error(t('learn.loginRequired'));
                }

                const response = await fetch('/api/add-course-to-roadmap', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        course_title: window.currentCourse.title,
                        course_link: window.currentCourse.link,
                        course_description: window.currentCourse.description
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    // Başarı mesajı göster
                    addButton.innerHTML = t('learn.added');
                    addButton.classList.remove('opacity-50');
                    addButton.classList.add('bg-green-600');
                    
                    // 2 saniye sonra yönlendir
                    setTimeout(() => {
                        window.location.href = '/roadmap';
                    }, 2000);
                } else {
                    throw new Error(result.error || t('learn.addCourseError'));
                }

            } catch (error) {
                console.error('Error:', error);
                
                // Butonu eski haline getir
                addButton.innerHTML = originalText;
                addButton.disabled = false;
                addButton.classList.remove('opacity-50');
                
                swalError(t('learn.errorGeneric'));
                return;
            }
        }

        function resetForm() {
            document.getElementById('resultsContainer').classList.add('hidden');
            document.getElementById('formContainer').classList.remove('hidden');
            document.getElementById('learningForm').reset();
            window.currentCourse = null;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof initI18n === 'function') {
                await initI18n();
                applyTranslations();
            }

            const token = localStorage.getItem('authToken');
            if (!token) {
                swalWarning(t('learn.loginRequiredPage')).then(() => {
                    window.location.href = '/login';
                });
                return;
            }
        });
    </script>

 </body></html>
