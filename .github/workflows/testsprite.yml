name: TestSprite CI/CD Verification

# Runs automatically on push to master, and manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Wake live app
        run: |
          curl -sf --retry 5 --retry-delay 15 \
            https://testsprite-hackathonseason3-knowledgewar-xk2p.onrender.com/ \
            || true

      # CI runs ONLY the current iteration's tests (save credits).
      # Banked & passing (do not re-run): Iteration 2 (01,03,04,05),
      #   Iteration 3 (07,08,09,11).
      # Waived (false blocked, never in CI): 02 9d591c13, 06 bac70c37,
      #   12 64381628.
      #
      # Iteration 4 — bug re-check + Roadmap/Test page (5 tests):
      #   10 Language toggle on hash  ebe0b04d-cc30-42bb-b098-ab70faa31458  (re-check fix)
      #   13 Roadmap smoke + nav      9c5d5682-80cf-476a-a479-0c9f6a9e63c9
      #   14 Roadmap i18n TR + persist f649b96b-fd79-4fb6-859e-203699e69d0c
      #   15 Roadmap Start -> /learn  8fed1daf-1418-46b3-ba49-4f6da94298f7
      #   16 Test page answer + result 0dff072e-5f17-44c4-93db-99268f2a793e
      - name: Run TestSprite Frontend Suite (Iteration 4 — fix re-check + 4 new)
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_TOKEN }}
        run: |
          testsprite setup --from-env
          set +e
          FAIL=0
          for ID in \
            ebe0b04d-cc30-42bb-b098-ab70faa31458 \
            9c5d5682-80cf-476a-a479-0c9f6a9e63c9 \
            f649b96b-fd79-4fb6-859e-203699e69d0c \
            8fed1daf-1418-46b3-ba49-4f6da94298f7 \
            0dff072e-5f17-44c4-93db-99268f2a793e; do
            testsprite test run "$ID" --wait || FAIL=1
          done
          exit $FAIL
