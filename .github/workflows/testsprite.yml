name: TestSprite CI/CD Verification

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run full suite (7 tests) instead of failed-only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Wake live app
        run: |
          curl -sf --retry 5 --retry-delay 15 \
            https://testsprite-hackathonseason3-knowledgewar-xk2p.onrender.com/ \
            || true

      - name: Run TestSprite Web Test
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_TOKEN }}
        run: |
          testsprite setup --from-env
          if [ "${{ github.event.inputs.run_all }}" = "true" ]; then
            for ID in \
              b14b87e9-49c8-434d-b054-86fb37fcf94a \
              73374ea0-00ce-4307-9275-2b98f264bf33 \
              28118134-b833-4b6f-ba20-38efd0bff083 \
              c3f060b1-79bd-4f39-8f99-e388ff26a10f \
              ad90b2b9-f857-4c92-8d6a-135b5ddc28c7 \
              d747883b-de16-429c-8f9b-31ae98a2f33c \
              d32cca15-c7ba-494b-9098-63396ec998f8; do
              testsprite test run "$ID" --wait
            done
          else
            # Failed-only: Home interaction — Use tournaments button repeatedly
            testsprite test run ad90b2b9-f857-4c92-8d6a-135b5ddc28c7 --wait
          fi
