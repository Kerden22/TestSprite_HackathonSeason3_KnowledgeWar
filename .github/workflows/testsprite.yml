name: TestSprite CI/CD Verification

# Runs automatically on push to master, and manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Wake live app
        run: |
          curl -sf --retry 5 --retry-delay 15 \
            https://testsprite-hackathonseason3-knowledgewar-xk2p.onrender.com/ \
            || true

      # CI runs ONLY the current iteration's tests (save credits).
      # Banked & passing (do not re-run): Iteration 2–4 (see LOOP.md).
      # Waived (false blocked, never in CI): 02, 06, 12, 14, 15.
      #
      # Iteration 5 — Tournament / Profile / Learn / Admin (6 tests):
      #   17 Tournament EN smoke        b0ff2134-a12f-4f54-8ea4-a47475f25c30
      #   18 Tournament i18n TR         d9f72918-65da-4a2d-b5eb-cc87b450dd37
      #   19 Profile EN smoke           bf65fb04-0699-48e4-a152-ee39bb58f3cb
      #   20 Learn EN smoke             fba7706b-a527-420a-810a-c335657d168c
      #   21 Tournament admin i18n      d8d0fdec-58c6-4f70-812b-49ae67ae1dd2
      #   22 Tournament admin AI gen    d2bc376f-8d9d-4588-ab07-7131ecb426c3
      - name: Run TestSprite Frontend Suite (Iteration 5 — 6 new tests)
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_TOKEN }}
        run: |
          testsprite setup --from-env
          set +e
          FAIL=0
          for ID in \
            b0ff2134-a12f-4f54-8ea4-a47475f25c30 \
            d9f72918-65da-4a2d-b5eb-cc87b450dd37 \
            bf65fb04-0699-48e4-a152-ee39bb58f3cb \
            fba7706b-a527-420a-810a-c335657d168c \
            d8d0fdec-58c6-4f70-812b-49ae67ae1dd2 \
            d2bc376f-8d9d-4588-ab07-7131ecb426c3; do
            testsprite test run "$ID" --wait || FAIL=1
          done
          exit $FAIL
