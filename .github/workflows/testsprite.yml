name: TestSprite CI/CD Verification

# Manual only — push does not trigger tests (saves credits on deploy).
on:
  workflow_dispatch:
    inputs:
      run_frontend:
        description: 'Run frontend tests (3)'
        type: boolean
        default: true
      run_backend:
        description: 'Run all backend tests (11)'
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Wake live app (Render)
        run: |
          for i in $(seq 1 10); do
            if curl -sf --max-time 30 \
              https://testsprite-hackathonseason3-knowledgewar-xk2p.onrender.com/; then
              echo "App is up (attempt $i)"
              exit 0
            fi
            echo "Waiting for deploy... attempt $i"
            sleep 30
          done
          echo "Wake failed — tests may run against stale deploy"

      - name: Run TestSprite tests (FE → BE)
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_TOKEN }}
        run: |
          testsprite setup --from-env
          set +e
          FAIL=0

          FE_IDS="a4bd6c04-4004-420f-be9a-4af47d64a62c
          eca16881-f0d2-40c2-9091-7ec7fa9ab2dc
          a4732506-19fa-4e38-ac5e-157e6c442737"

          BE_IDS="8fe0eb1f-ca3c-4b5f-83b0-f0905b931ba2
          407ed44d-77cc-4f4d-a31d-935f373ba624
          8444706e-34e4-417a-af10-5a927382307c
          bee6c90f-63d7-40cd-ab84-c2043f5df9b8
          561cd21f-575e-4b4c-8986-85cb35eed654
          70309105-5aa8-45e9-b219-c1e933ce0ee4
          584d61dd-572f-4773-8054-ae43cb37238c
          18faba0d-d05d-4917-b3e6-ddff4dd05193
          36932166-8aa3-487c-8366-b93f8c5f72a7
          a7bbf927-b0dc-411f-8687-54ceff12bb44
          f046f210-520d-4578-9d16-5bc85ee6313c"

          if [ "${{ inputs.run_frontend }}" = "true" ]; then
            echo "=== Frontend tests (3) ==="
            for ID in $FE_IDS; do
              echo "--- FE $ID ---"
              testsprite test run "$ID" --wait || FAIL=1
            done
          fi

          if [ "${{ inputs.run_backend }}" = "true" ]; then
            echo "=== Backend tests (11) ==="
            for ID in $BE_IDS; do
              echo "--- BE $ID ---"
              testsprite test run "$ID" --wait || FAIL=1
            done
          fi

          exit $FAIL
