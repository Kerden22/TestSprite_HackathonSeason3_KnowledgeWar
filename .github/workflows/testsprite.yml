name: TestSprite CI/CD Verification

# Runs automatically on push to master, and manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Wake live app
        run: |
          curl -sf --retry 5 --retry-delay 15 \
            https://testsprite-hackathonseason3-knowledgewar-xk2p.onrender.com/ \
            || true

      # CI runs ONLY the current iteration's new tests (save credits).
      # Iteration 2 (01,03,04,05) already PASSED and is banked — do not re-run.
      # Waived (false blocked, never in CI): 02 9d591c13, 06 bac70c37.
      #
      # Iteration 3 — new tests under verification:
      #   07 Guest -> /tournament     bebca88c-00ad-4b9f-9253-b0b0fb427483
      #   08 Guest -> /profile        3053ece4-7d08-4764-8575-54e7b8b6045d
      #   09 Guest -> /roadmap        fe10d08c-8125-407f-ae04-32da74283161
      #   10 Language toggle on hash  ebe0b04d-cc30-42bb-b098-ab70faa31458
      #   11 Logged-in home nav       f2742156-bc3e-46e4-8897-6f925e2848d2
      #   12 Logged-in tourn+roadmap  64381628-3fcd-4680-86f0-43810d771572
      - name: Run TestSprite Frontend Suite (Iteration 3 — 6 new tests)
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_TOKEN }}
        run: |
          testsprite setup --from-env
          set +e
          FAIL=0
          for ID in \
            bebca88c-00ad-4b9f-9253-b0b0fb427483 \
            3053ece4-7d08-4764-8575-54e7b8b6045d \
            fe10d08c-8125-407f-ae04-32da74283161 \
            ebe0b04d-cc30-42bb-b098-ab70faa31458 \
            f2742156-bc3e-46e4-8897-6f925e2848d2 \
            64381628-3fcd-4680-86f0-43810d771572; do
            testsprite test run "$ID" --wait || FAIL=1
          done
          exit $FAIL
