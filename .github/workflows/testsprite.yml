name: TestSprite CI/CD Verification

on:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install TestSprite CLI
        run: pip install testsprite

      - name: Run TestSprite Tests
        env:
          TESTSPRITE_TOKEN: ${{ secrets.TESTSPRITE_TOKEN }}
        run: testsprite run --all
