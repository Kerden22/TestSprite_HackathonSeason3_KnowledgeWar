name: TestSprite CI/CD Verification

# Runs automatically on push to master, and manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/testsprite-cli

      - name: Wake live app
        run: |
          curl -sf --retry 5 --retry-delay 15 \
            https://testsprite-hackathonseason3-knowledgewar-xk2p.onrender.com/ \
            || true

      # IDs from create-batch (2026-07-03):
      #   01 Home hero content        5d9b778f-e464-43ae-b1af-f206b29d5dd8
      #   02 Home nav anchor scroll   9d591c13-f8f2-44d5-b3a7-837309caa264
      #   03 Home i18n TR             acaa43a5-8f9e-4fb1-befd-259956d47da9
      #   04 Guest nav                d6999073-921c-4ab5-ae47-47db44c17615
      #   05 Login/Register form      88d22a64-600f-4f17-8c80-cf57c0c7688c
      #   06 Logout flow              bac70c37-5570-4083-ba52-3e69638475a0
      - name: Run TestSprite Frontend Suite (6 tests)
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_TOKEN }}
        run: |
          testsprite setup --from-env
          set +e
          FAIL=0
          for ID in \
            5d9b778f-e464-43ae-b1af-f206b29d5dd8 \
            9d591c13-f8f2-44d5-b3a7-837309caa264 \
            acaa43a5-8f9e-4fb1-befd-259956d47da9 \
            d6999073-921c-4ab5-ae47-47db44c17615 \
            88d22a64-600f-4f17-8c80-cf57c0c7688c \
            bac70c37-5570-4083-ba52-3e69638475a0; do
            testsprite test run "$ID" --wait || FAIL=1
          done
          exit $FAIL
