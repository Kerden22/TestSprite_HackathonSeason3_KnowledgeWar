name: TestSprite CI/CD Verification

on:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TestSprite CLI
        run: npm install -g @testsprite/cli

      - name: Run TestSprite Tests
        env:
          TESTSPRITE_TOKEN: ${{ secrets.TESTSPRITE_TOKEN }}
        run: testsprite run --all
